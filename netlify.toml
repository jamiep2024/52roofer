[build]
  command = "npm run build"
  publish = ".next"
  environment = { NODE_VERSION = "18.17.0", NPM_FLAGS = "--legacy-peer-deps" }

[[plugins]]
  package = "@netlify/plugin-nextjs"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Content-Security-Policy = "default-src 'self' https://script.google.com https://www.youtube.com; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https: https://img.youtube.com; font-src 'self' data:; frame-src 'self' https://www.youtube.com; connect-src 'self' https://script.google.com https://*.google.com;"
